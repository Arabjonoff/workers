<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Super Admin — Kirish</title>
  <link rel="stylesheet" href="/static/vendors/mdi/css/materialdesignicons.min.css">
  <style>
    *{box-sizing:border-box;}
    body{margin:0;font-family:'Roboto',system-ui,sans-serif;min-height:100vh;display:flex;
        align-items:center;justify-content:center;padding:20px;
        background:linear-gradient(135deg,#282f3a 0%,#4d83ff 100%);}
    .card{background:#fff;width:100%;max-width:400px;border-radius:20px;padding:40px 34px;
        box-shadow:0 24px 60px rgba(0,0,0,.3);}
    .badge{width:66px;height:66px;border-radius:18px;margin:0 auto 16px;display:flex;
        align-items:center;justify-content:center;color:#fff;font-size:32px;
        background:linear-gradient(135deg,#282f3a,#4d83ff);}
    h1{text-align:center;font-size:22px;font-weight:800;color:#282f3a;margin:0 0 4px;}
    .sub{text-align:center;color:#9aa0ac;font-size:14px;margin:0 0 26px;}
    .field{position:relative;margin-bottom:16px;}
    .field i{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:#9aa0ac;font-size:20px;}
    .field input{width:100%;border:1px solid #e6e9f0;border-radius:12px;padding:14px 14px 14px 46px;
        font-size:15px;background:#f9fafc;}
    .field input:focus{outline:none;border-color:#4d83ff;background:#fff;box-shadow:0 0 0 4px rgba(77,131,255,.12);}
    button{width:100%;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;color:#fff;
        cursor:pointer;background:linear-gradient(135deg,#282f3a,#4d83ff);}
    .err{background:#ffeeee;color:#e23b3b;border-radius:10px;padding:11px 14px;font-size:13.5px;margin-bottom:16px;}
  </style>
</head>
<body>
  <div class="card">
    <div class="badge"><i class="mdi mdi-shield-crown"></i></div>
    <h1>Super Admin</h1>
    <p class="sub">Platforma boshqaruv paneli</p>
    {% if error %}<div class="err"><i class="mdi mdi-alert-circle"></i> Login yoki parol noto'g'ri (yoki ruxsat yo'q).</div>{% endif %}
    <form method="post">{% csrf_token %}
      <div class="field"><i class="mdi mdi-account-outline"></i><input name="username" placeholder="Login" required autofocus></div>
      <div class="field"><i class="mdi mdi-lock-outline"></i><input type="password" name="password" placeholder="Parol" required></div>
      <button type="submit"><i class="mdi mdi-login"></i> Kirish</button>
    </form>
  </div>
</body>
</html>
