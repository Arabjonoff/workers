<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Ishchi — Kirish</title>
  <link rel="stylesheet" href="/static/vendors/mdi/css/materialdesignicons.min.css">
  <link rel="shortcut icon" href="/static/images/favicon.png" />
  <style>
    *{box-sizing:border-box;}
    body{margin:0;font-family:'Roboto',system-ui,sans-serif;min-height:100vh;display:flex;
        align-items:center;justify-content:center;padding:20px;background:#f4f6fb;}
    .card{background:#fff;width:100%;max-width:400px;border-radius:18px;padding:38px 32px;
        border:1px solid #eceff4;box-shadow:0 8px 30px rgba(40,47,58,.08);}
    .badge{width:68px;height:68px;border-radius:18px;margin:0 auto 18px;display:flex;
        align-items:center;justify-content:center;color:#fff;font-size:34px;background:#4d83ff;}
    h1{text-align:center;font-size:22px;font-weight:800;color:#282f3a;margin:0 0 4px;}
    .sub{text-align:center;color:#9aa0ac;font-size:14px;margin:0 0 26px;}
    .field{margin-bottom:16px;}
    .field label{display:block;font-size:12px;font-weight:600;color:#6b7280;text-transform:uppercase;
        letter-spacing:.4px;margin-bottom:7px;}
    .input{position:relative;display:block;}
    .input i{position:absolute;top:50%;transform:translateY(-50%);color:#9aa0ac;font-size:20px;line-height:1;}
    .input .lead{left:15px;}
    .input .toggle-eye{right:15px;cursor:pointer;}
    .input input{width:100%;border:1px solid #e2e6ee;border-radius:11px;padding:13px 44px 13px 46px;
        font-size:15px;color:#282f3a;background:#fbfcfe;transition:.15s;}
    .input input:focus{outline:none;border-color:#4d83ff;background:#fff;box-shadow:0 0 0 3px rgba(77,131,255,.12);}
    button{width:100%;border:none;border-radius:11px;padding:14px;font-size:15px;font-weight:700;color:#fff;
        cursor:pointer;background:#4d83ff;transition:.15s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:6px;}
    button:hover{background:#3b72f0;}
    .err{background:#fdecec;color:#e23b3b;border:1px solid #f8d4d4;border-radius:10px;padding:11px 14px;
        font-size:13.5px;margin-bottom:18px;display:flex;align-items:center;gap:8px;}
    .hint{text-align:center;color:#b4b9c4;font-size:12.5px;margin-top:20px;}
  </style>
</head>
<body>
  <div class="card">
    <div class="badge"><i class="mdi mdi-account-hard-hat"></i></div>
    <h1>Ishchi kirishi</h1>
    <p class="sub">Telefon raqamingiz va parol bilan kiring</p>

    {% if error %}
    <div class="err"><i class="mdi mdi-alert-circle"></i> Telefon yoki parol noto'g'ri.</div>
    {% endif %}

    <form method="post">{% csrf_token %}
      <div class="field">
        <label>Telefon raqami</label>
        <div class="input">
          <i class="mdi mdi-phone-outline lead"></i>
          <input type="text" name="phone" inputmode="numeric" placeholder="90 123 45 67" required autofocus>
        </div>
      </div>
      <div class="field">
        <label>Parol</label>
        <div class="input">
          <i class="mdi mdi-lock-outline lead"></i>
          <input type="password" name="password" id="pw" placeholder="Parol" required>
          <i class="mdi mdi-eye-outline toggle-eye" id="eye" onclick="var p=document.getElementById('pw'),e=document.getElementById('eye');if(p.type==='password'){p.type='text';e.className='mdi mdi-eye-off-outline toggle-eye';}else{p.type='password';e.className='mdi mdi-eye-outline toggle-eye';}"></i>
        </div>
      </div>
      <button type="submit"><i class="mdi mdi-login"></i> Kirish</button>
    </form>

    <div class="hint">Parolni bilmasangiz, administratoringizga murojaat qiling</div>
  </div>
</body>
</html>
